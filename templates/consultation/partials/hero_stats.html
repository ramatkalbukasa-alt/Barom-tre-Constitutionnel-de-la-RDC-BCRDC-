<div class="w-full px-8 py-10">
  {% if stats.total == 0 %}
  <div class="text-center">
    <p class="text-white/50 text-xs font-black uppercase tracking-[0.3em] mb-4">Résultats en direct</p>
    <p class="font-black text-white text-7xl leading-none mb-3">0</p>
    <p class="text-white/60 text-sm font-medium">participant · soyez le premier !</p>
    <a href="/participer/" class="inline-block mt-6 btn btn-yel text-sm">Participer maintenant</a>
  </div>
  {% else %}
  <div class="mb-6">
    <p class="text-white/50 text-xs font-black uppercase tracking-[0.3em] mb-1">Participants</p>
    <p class="font-black text-white text-6xl leading-none">{{ stats.total }}</p>
  </div>
  <div class="space-y-4">
    <!-- Maintien bar -->
    <div>
      <div class="flex justify-between items-center mb-1.5">
        <span class="text-white font-black text-xs uppercase tracking-wider">Maintien</span>
        <span class="text-[#F0C020] font-black text-lg leading-none">{{ stats.maintien_pct }}%</span>
      </div>
      <div class="w-full bg-white/10 h-3 border border-white/20">
        <div class="h-full bg-white transition-all duration-700" style="width: {{ stats.maintien_pct }}%"></div>
      </div>
    </div>
    <!-- Révision bar -->
    <div>
      <div class="flex justify-between items-center mb-1.5">
        <span class="text-white font-black text-xs uppercase tracking-wider">Révision</span>
        <span class="text-[#F0C020] font-black text-lg leading-none">{{ stats.revision_pct }}%</span>
      </div>
      <div class="w-full bg-white/10 h-3 border border-white/20">
        <div class="h-full bg-[#F0C020] transition-all duration-700" style="width: {{ stats.revision_pct }}%"></div>
      </div>
    </div>
    <!-- Changement bar -->
    <div>
      <div class="flex justify-between items-center mb-1.5">
        <span class="text-white font-black text-xs uppercase tracking-wider">Changement</span>
        <span class="text-[#F0C020] font-black text-lg leading-none">{{ stats.changement_pct }}%</span>
      </div>
      <div class="w-full bg-white/10 h-3 border border-white/20">
        <div class="h-full bg-[#D02020] transition-all duration-700" style="width: {{ stats.changement_pct }}%"></div>
      </div>
    </div>
  </div>
  <a href="/consultation/tableau-de-bord/" class="inline-block mt-6 text-white/60 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors">
    Tableau de bord complet →
  </a>
  {% endif %}
</div>
