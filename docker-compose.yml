services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: bcrdc_db
      POSTGRES_USER: bcrdc_user
      POSTGRES_PASSWORD: bcrdc_pass
    # Host port 5434 — avoid 5432/5433 which are often used by a local PostgreSQL 16 (pgAdmin).
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcrdc_user -d bcrdc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env
    environment:
      # Local-friendly defaults; use config.settings.prod behind a TLS proxy in production.
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://bcrdc_user:bcrdc_pass@db:5432/bcrdc_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://bcrdc_user:bcrdc_pass@db:5432/bcrdc_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://bcrdc_user:bcrdc_pass@db:5432/bcrdc_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
